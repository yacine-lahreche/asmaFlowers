<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Asma Flowers</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/collections.css">
</head>
<body>
    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div class="toast-icon">✓</div>
        <span id="toastMsg">Added to Cart</span>
    </div>

    <header class="header">
        <a href="index.html" class="btn-back">Back to Site</a>
        <div class="logo">Collections</div>
        <button id="cartBtn" class="cart-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span id="cartCount" class="cart-count">0</span>
        </button>
    </header>

    <div class="container">
        <div class="glass-container">
            <section class="page-title">
                <p>The Eternal Silk Selection</p>
                <h1>Discover Our Collections</h1>
            </section>

            <main class="products-grid" id="productsGrid">
                <!-- Products will be injected dynamically from LocalStorage -->
            </main>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal-overlay">
        <div class="modal-card cart-modal">
            <h2>Your Sanctuary Cart</h2>
            <div id="cartItems" class="cart-items-list">
                <!-- Cart items will be injected here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cartTotalText">0.00 DA</span>
                </div>
                <button id="checkoutBtn" class="btn-checkout">Checkout</button>
            </div>
            <button id="closeCart" class="close-btn">Close Cart</button>
        </div>
    </div>

    <!-- Quantity Modal -->
    <div id="qtyModal" class="modal-overlay" style="z-index: 1000;">
        <div class="modal-card qty-modal">
            <button id="closeQty" class="qty-close">&times;</button>
            <div class="qty-container">
                <div class="qty-left">
                    <img id="qtyProdImg" src="" alt="">
                </div>
                <div class="qty-right">
                    <span id="qtyProdTag" class="product-tag" style="position: static; display: inline-block; margin-bottom: 10px; width: fit-content;"></span>
                    <h2 id="qtyProdName"></h2>
                    <p id="qtyProdDesc" style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 30px;"></p>
                    
                    <div class="qty-control-section">
                        <label>QUANTITY</label>
                        <div class="qty-counter">
                            <button id="qtyMinus">-</button>
                            <span id="qtyValue">1</span>
                            <button id="qtyPlus">+</button>
                        </div>
                    </div>

                    <div class="qty-price-section">
                        <label>ESTIMATED TOTAL</label>
                        <div id="qtyTotal" class="qty-total-price">0 DA</div>
                    </div>

                    <button id="confirmAddBtn" class="btn-confirm" style="margin-top: auto; border: none; width: 100%;">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-card checkout-modal">
            <!-- Order Form -->
            <div id="orderFormContainer">
                <h2>Order Details</h2>
                <form id="orderForm" class="order-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="custName" required placeholder="Ex: Yacine Ben">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="custPhone" required placeholder="06XXXXXXXX">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Wilaya</label>
                            <input type="text" id="custWilaya" required placeholder="Ex: Algiers">
                        </div>
                        <div class="form-group">
                            <label>Dayra</label>
                            <input type="text" id="custDayra" required placeholder="Ex: Kouba">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Home Address</label>
                        <textarea id="custAddr" rows="2" required placeholder="Rue, N°, Building..."></textarea>
                    </div>
                    <button type="submit" class="btn-confirm">Confirm & Order via WhatsApp</button>
                    <button type="button" id="backToCart" class="close-btn">Cancel</button>
                </form>
            </div>

            <!-- Success Message (initially hidden) -->
            <div id="orderSuccess" style="display: none; text-align: center; padding: 40px 0;">
                <div style="background: rgba(37, 211, 102, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: #25d366;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h2 style="margin-bottom: 20px;">Your Order was Sent!</h2>
                <p style="opacity: 0.7; line-height: 1.6; margin-bottom: 40px;">We've received your request. <br> Our artisans will contact you shortly to confirm details.</p>
                <button onclick="closeSuccessModal()" class="btn-confirm" style="background: var(--text-main);">Back to Sanctuary</button>
            </div>
        </div>
    </div>

    <!-- Additional Styles -->

    <script src="js/collections.js"></script>
</body>
</html>

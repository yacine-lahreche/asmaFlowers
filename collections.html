<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Asma Flowers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-accent: #a66a6a;
            --primary-accent-dark: #824f4f;
            --secondary-green: #545454;
            --text-main: #1e2022;
            --text-muted: #434547;
            --white: #ffffff;
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --curve: cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-soft: 0 40px 100px -20px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: url('assets/bg.png') center/cover no-repeat fixed;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            padding: 60px 40px;
        }

        .nav-header {
            max-width: 1400px;
            margin: 0 auto 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            max-width: 1400px;
            margin: 0 auto;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s var(--curve);
            font-size: 0.95rem;
            opacity: 0.7;
        }

        .btn-back::before {
            content: '←';

            transition: transform 0.3s var(--curve);
        }

        .btn-back:hover {
            opacity: 1;
        }

        .btn-back:hover::before {
            transform: translateX(-8px);
        }

        /* .back-link {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--glass-white);
            padding: 20px;
            width: 70px;
            height: 70px;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500; 
            font-size: 1.5rem;
            opacity: 0.7;
            transition: opacity 0.3s var(--curve);
            position: absolute;
            left: 0;
        }

        .back-link:hover { opacity: 1; }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
        } */

        /* Glass Container (Mirroring index.html glass-card) */
        .glass-container {
            background: var(--glass-white);
            backdrop-filter: blur(5px) saturate(140%);
            -webkit-backdrop-filter: blur(45px) saturate(140%);
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            padding: 80px;
            margin: 40px auto;
            position: relative;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            width: 100%;
        }

        /* Inner Glow for Container */
        .glass-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 2px 20px rgba(255,255,255,0.4);
            z-index: 5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            text-align: center;
            margin-bottom: 100px;
        }

        .page-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .page-title p {
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 50px;
        }

        .product-card {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            text-align: center;
            transition: all 0.5s var(--curve);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .product-card:hover {
            transform: translateY(-15px);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
        }

        .image-wrapper {
            background: rgba(255,255,255,0.3);
            border-radius: 30px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .image-wrapper img {
            width: 80%;
            transition: transform 0.6s var(--curve);
        }

        .product-card:hover .image-wrapper img {
            transform: scale(1.1) rotate(3deg);
        }

        .product-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--white);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: var(--primary-accent);
        }

        .product-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .product-info p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-add {
            background: var(--primary-accent);
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .btn-add:hover {
            background: var(--primary-accent-dark);
        }

        @media (max-width: 768px) {
            .page-title h1 { font-size: 2.5rem; }
            .products-grid { grid-template-columns: 1fr; }
            .glass-container { padding: 40px 20px; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="btn-back">Back to Site</a>
        <div class="logo">Collections</div>
        <button id="cartBtn" class="cart-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span id="cartCount" class="cart-count">0</span>
        </button>
    </header>

    <div class="container">
        <div class="glass-container">
            <section class="page-title">
                <p>The Eternal Silk Selection</p>
                <h1>Discover Our Collections</h1>
            </section>

            <main class="products-grid" id="productsGrid">
                <!-- Products will be injected dynamically from LocalStorage -->
            </main>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal-overlay">
        <div class="modal-card cart-modal">
            <h2>Your Sanctuary Bag</h2>
            <div id="cartItems" class="cart-items-list">
                <!-- Cart items will be injected here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cartTotalText">0.00 DA</span>
                </div>
                <button id="checkoutBtn" class="btn-checkout">Checkout</button>
            </div>
            <button id="closeCart" class="close-btn">Close Bag</button>
        </div>
    </div>

    <!-- Checkout Form Modal -->
    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-card checkout-modal">
            <h2>Order Details</h2>
            <form id="orderForm" class="order-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="custName" required placeholder="Ex: Yacine Ben">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="custPhone" required placeholder="06XXXXXXXX">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Wilaya</label>
                        <input type="text" id="custWilaya" required placeholder="Ex: Algiers">
                    </div>
                    <div class="form-group">
                        <label>Dayra</label>
                        <input type="text" id="custDayra" required placeholder="Ex: Kouba">
                    </div>
                </div>
                <div class="form-group">
                    <label>Home Address</label>
                    <textarea id="custAddr" rows="2" required placeholder="Rue, N°, Building..."></textarea>
                </div>
                <button type="submit" class="btn-confirm">Confirm & Order via WhatsApp</button>
                <button type="button" id="backToCart" class="close-btn">Cancel</button>
            </form>
        </div>
    </div>

    <!-- Additional Styles -->
    <style>
        .checkout-modal {
            background: var(--glass-white);
            backdrop-filter: blur(45px) saturate(140%);
            -webkit-backdrop-filter: blur(45px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            box-shadow: var(--shadow-soft);
            max-width: 600px;
            width: 90%;
            padding: 50px;
        }

        .order-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .order-form label {
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.7;
        }

        .order-form input, .order-form textarea {
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.4);
            font-family: inherit;
            transition: all 0.3s;
        }

        .order-form input:focus, .order-form textarea:focus {
            outline: none;
            background: white;
            border-color: var(--primary-accent);
        }

        .btn-confirm {
            background: #25d366; /* WhatsApp Green */
            color: white;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-confirm:hover {
            background: #128c7e;
            transform: translateY(-2px);
        }

    /* <!-- Additional Styles --> */
    
        .cart-btn {
            background: rgba(255,255,255,0.4);
            border: 1px solid var(--glass-border);
            padding: 12px;
            margin-left: 59px;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--curve);
        }

        .cart-btn:hover {
            background: white;
            transform: translateY(-2px);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--primary-accent);
            color: white;
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        /* Modal Overrides */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s var(--curve);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-modal {
            width: 70%;
            max-width: 700px;
            padding: 60px;
            text-align: left;
            align-items: flex-start;
            background: var(--glass-white);
            backdrop-filter: blur(45px) saturate(140%);
            -webkit-backdrop-filter: blur(45px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            box-shadow: var(--shadow-soft);
        }

        .cart-items-list {
            width: 100%;
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .cart-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 15px;
            background: rgba(255,255,255,0.3);
        }

        .cart-item-info {
            flex-grow: 1;
        }

        .cart-item-info h4 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .cart-item-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .cart-footer {
            width: 100%;
            border-top: 2px solid var(--glass-border);
            padding-top: 30px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .btn-checkout {
            width: 100%;
            background: var(--primary-accent);
            color: white;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 20px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-checkout:hover {
            background: var(--primary-accent-dark);
            transform: translateY(-2px);
        }
        
        .close-btn {
            background: none;
            border: none;
            /* margin-top: 20px; */
            width: 100%;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>

    <script>
        // const initialProducts = [
        //     { id: 1, name: 'Satin Classique', price: '4500 DA', img: 'assets/flower.png', tag: 'Most Loved', desc: 'Meticulously folded silken petals in our signature deep rose hue. A masterpiece of symmetry and softness.' },
        //     { id: 2, name: 'Eternal Champagne', price: '5200 DA', img: 'assets/satin_rose.png', tag: 'Boutique', desc: 'Luxurious champagne-tinted satin ribbons, arranged for an ethereal shimmer under any light.' },
        //     { id: 3, name: 'Midnight Bloom', price: '4800 DA', img: 'assets/flower.png', tag: 'New Release', desc: 'A daring deep violet aesthetic, combining avant-garde folding techniques with premium silk textures.' }
        // ];

        let cart = JSON.parse(localStorage.getItem('asmaFlowersCart')) || [];

        function renderProducts() {
            const products = JSON.parse(localStorage.getItem('asmaFlowersProducts')) || initialProducts;
            const grid = document.getElementById('productsGrid');
            
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="image-wrapper">
                        ${p.tag ? `<span class="product-tag">${p.tag}</span>` : ''}
                        <img src="${p.img}" alt="${p.name}" style="${p.img.includes('satin_rose') || p.img.includes('hero') ? 'mix-blend-mode: multiply;' : ''}">
                    </div>
                    <div class="product-info">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                    </div>
                    <div class="product-footer">
                        <span class="price">${p.price}</span>
                        <a href="javascript:void(0)" class="btn-add" onclick="addToCart(${p.id})">Add to Cart</a>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            const products = JSON.parse(localStorage.getItem('asmaFlowersProducts')) || initialProducts;
            const product = products.find(p => p.id === productId);
            
            if (product) {
                cart.push(product);
                localStorage.setItem('asmaFlowersCart', JSON.stringify(cart));
                updateCartUI();
                
                // Optional: visual feedback
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Added!';
                btn.style.background = '#7d8c7d';
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = '';
                }, 1000);
            }
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('asmaFlowersCart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotalText = document.getElementById('cartTotalText');
            
            cartCount.innerText = cart.length;
            
            let total = 0;
            cartItems.innerHTML = cart.map((item, index) => {
                const priceValue = parseFloat(item.price.replace(' DA', '').replace('$', ''));
                total += priceValue;
                return `
                    <div class="cart-item">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p>${item.price}</p>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart(${index})">Remove</button>
                    </div>
                `;
            }).join('');

            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align:center; opacity:0.5; padding: 40px 0;">Your bag is empty.</p>';
            }

            cartTotalText.innerText = `${total.toLocaleString()} DA`;
        }

        // Modal Logic
        const modal = document.getElementById('cartModal');
        const checkoutModal = document.getElementById('checkoutModal');
        const cartBtn = document.getElementById('cartBtn');
        const closeCart = document.getElementById('closeCart');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const backToCart = document.getElementById('backToCart');
        const orderForm = document.getElementById('orderForm');

        cartBtn.addEventListener('click', () => {
            modal.classList.add('active');
            updateCartUI();
        });

        closeCart.addEventListener('click', () => modal.classList.remove('active'));
        
        checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                alert('Your bag is empty.');
                return;
            }
            modal.classList.remove('active');
            checkoutModal.classList.add('active');
        });

        backToCart.addEventListener('click', () => {
            checkoutModal.classList.remove('active');
            modal.classList.add('active');
        });

        orderForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const wilaya = document.getElementById('custWilaya').value;
            const dayra = document.getElementById('custDayra').value;
            const addr = document.getElementById('custAddr').value;

            // Format Order Message
            let total = 0;
            let itemsText = cart.map(item => {
                total += parseFloat(item.price.replace(' DA', '').replace('$', ''));
                return `- ${item.name} (${item.price})`;
            }).join('%0A');

            const message = `*NEW ORDER FROM ASMA FLOWERS*%0A%0A` +
                            `*Customer Details:*%0A` +
                            `Name: ${name}%0A` +
                            `Phone: ${phone}%0A` +
                            `Location: ${wilaya}, ${dayra}%0A` +
                            `Address: ${addr}%0A%0A` +
                            `*Items ordered:*%0A${itemsText}%0A%0A` +
                            `*Total Amount:* ${total.toLocaleString()} DA %0A%0A` +
                            `_Sent via Asma Flowers Web App_`;

            const whatsappUrl = `https://wa.me/213696004501?text=${message}`;
            
            // Open WhatsApp
            window.open(whatsappUrl, '_blank');
            
            // Clear cart and close
            cart = [];
            localStorage.setItem('asmaFlowersCart', JSON.stringify(cart));
            updateCartUI();
            checkoutModal.classList.remove('active');
            orderForm.reset();
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        checkoutModal.addEventListener('click', (e) => {
            if (e.target === checkoutModal) checkoutModal.classList.remove('active');
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartUI();
        });
        
        window.addEventListener('storage', () => {
            renderProducts();
            cart = JSON.parse(localStorage.getItem('asmaFlowersCart')) || [];
            updateCartUI();
        });
    </script>
</body>
</html>

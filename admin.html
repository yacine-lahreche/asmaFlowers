<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Asma Flowers</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-accent: #a66a6a;
            --primary-accent-dark: #824f4f;
            --secondary-green: #545454;
            --text-main: #1e2022;
            --text-muted: #434547;
            --white: #ffffff;
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --curve: cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-soft: 0 40px 100px -20px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: url('assets/bg.png') center/cover no-repeat fixed;
            min-height: 100vh;
            color: var(--text-main);
            padding: 40px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .glass-card {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 40px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* Form Styling */
        .admin-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.8;
        }

        input, textarea {
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.5);
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            background: white;
            border-color: var(--primary-accent);
        }

        .btn-add {
            grid-column: span 2;
            background: var(--primary-accent);
            color: white;
            padding: 18px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: var(--primary-accent-dark);
            transform: translateY(-2px);
        }

        /* Inventory Table */
        .inventory-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .inventory-list th, .inventory-list td {
            text-align: left;
            padding: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .inventory-list th {
            font-weight: 600;
            opacity: 0.6;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .item-preview {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: rgba(255,255,255,0.3);
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .settings-btn {
            background: rgba(255,255,255,0.4);
            border: 1px solid var(--glass-border);
            padding: 12px;
            margin-left: 59px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--curve);
            color: var(--text-main);
        }

        .settings-btn:hover {
            background: white;
            transform: translateY(-2px);
        }

        .social-links-editor {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: background 0.3s;
        }

        .social-row:hover {
            background: rgba(255,255,255,0.4);
        }

        .social-label {
            font-weight: 600;
            opacity: 0.7;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .social-value {
            font-family: inherit;
            color: var(--text-muted);
        }

        .edit-container {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
        }

        .social-input {
            flex-grow: 1;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--primary-accent);
            background: white;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .btn-confirm-mini {
            background: var(--primary-accent);
            color: white;
            border: none;
            width: 50px;
            height: 35px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px !important;
            border: 1px solid rgba(255,255,255,0.6) !important;
            padding: 40px !important;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.12) !important;
            margin: 0 auto;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.4s var(--curve);
        }

        .btn-back::before {
            content: '←';

            transition: transform 0.3s var(--curve);
        }

        .btn-back:hover {
            opacity: 1;
        }

        .btn-back:hover::before {
            transform: translateX(-8px);
        }
    </style>
</head>
<body>

    <!-- Password Gate Overlay -->
    <div id="authOverlay" class="modal-overlay" style="display: flex; opacity: 1; pointer-events: auto; z-index: 9999;">
        <div class="modal-card auth-card" style="max-width: 400px; text-align: center;">
            <h1 style="font-family: 'Playfair Display', serif; margin-bottom: 30px;">Admin Access</h1>
            <div class="form-group" style="margin-bottom: 25px;">
                <input type="password" id="adminPassword" placeholder="Enter security key..." style="width: 100%; text-align: center;">
            </div>
            <button id="loginBtn" class="btn-add" style="grid-column: span 1; width: 100%;">Verify Identity</button>
        </div>
    </div>

    <div class="admin-container" id="adminContent" style="display: none;">
        <header class="header">
            <a href="index.html" class="btn-back">Back to Site</a>
            <div class="logo">Admin Dashboard</div>
            <button id="settingsBtn" class="settings-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </button>
        </header>

        <!-- Social Links Settings -->
        <section id="settingsSection" class="glass-card" style="display: none; margin-bottom: 40px;">
            <h2>Social Connect Options</h2>
            <div id="socialLinksList" class="social-links-editor">
                <!-- Social links will be injected here -->
            </div>
        </section>

        <!-- Add New Item -->
        <section class="glass-card">
            <h2>Add New Flower</h2>
            <form id="addFlowerForm" class="admin-form">
                <div class="form-group">
                    <label>Flower Name</label>
                    <input type="text" id="flowerName" required placeholder="e.g. Midnight Silk">
                </div>
                <div class="form-group">
                    <label>Price (DA)</label>
                    <input type="number" id="flowerPrice" required placeholder="45.00">
                </div>
                <div class="form-group">
                    <label>Upload Image</label>
                    <input type="file" id="flowerImg" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Tag</label>
                    <input type="text" id="flowerTag" placeholder="e.g. New Release">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea id="flowerDesc" rows="3" required placeholder="Describe the craftsmanship..."></textarea>
                </div>
                <button type="submit" class="btn-add">Add to Collection</button>
            </form>
        </section>

        <!-- Current Inventory -->
        <section class="glass-card">
            <h2>Current Inventory</h2>
            <div style="overflow-x: auto;">
                <table class="inventory-list">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Tag</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const initialProducts = [
            { id: 1, name: 'Satin Classique', price: '4500 DA', img: 'assets/flower.png', tag: 'Most Loved', desc: 'Meticulously folded silken petals in our signature deep rose hue.' },
            { id: 2, name: 'Eternal Champagne', price: '5200 DA', img: 'assets/satin_rose.png', tag: 'Boutique', desc: 'Luxurious champagne-tinted satin ribbons, arranged for shimmer.' },
            { id: 3, name: 'Midnight Bloom', price: '4800 DA', img: 'assets/flower.png', tag: 'New Release', desc: 'A daring deep violet aesthetic, combining avant-garde techniques.' }
        ];

        // Initialize LocalStorage if empty
        if (!localStorage.getItem('asmaFlowersProducts')) {
            localStorage.setItem('asmaFlowersProducts', JSON.stringify(initialProducts));
        }

        function getProducts() {
            return JSON.parse(localStorage.getItem('asmaFlowersProducts'));
        }

        function saveProducts(products) {
            localStorage.setItem('asmaFlowersProducts', JSON.stringify(products));
            renderDashboard();
        }

        function renderDashboard() {
            const products = getProducts();
            const table = document.getElementById('inventoryTable');
            table.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.img}" class="item-preview"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.price}</td>
                    <td>${p.tag || '-'}</td>
                    <td><button class="btn-delete" onclick="deleteItem(${p.id})">Delete</button></td>
                </tr>
            `).join('');
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to remove this piece from the collection?')) {
                const products = getProducts().filter(p => p.id !== id);
                saveProducts(products);
            }
        }

        document.getElementById('addFlowerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('flowerImg');
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadend = function() {
                const products = getProducts();
                const newItem = {
                    id: Date.now(),
                    name: document.getElementById('flowerName').value,
                    price: document.getElementById('flowerPrice').value + ' DA',
                    img: reader.result, // Base64 string
                    tag: document.getElementById('flowerTag').value,
                    desc: document.getElementById('flowerDesc').value
                };
                
                products.unshift(newItem);
                saveProducts(products);
                e.target.reset();
                alert('New flower added successfully!');
            }

            if (file) {
                reader.readAsDataURL(file);
            } else {
                alert('Please select an image file.');
            }
        });

        // Settings Toggle & Social Links Management
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsSection = document.getElementById('settingsSection');
        const socialLinksList = document.getElementById('socialLinksList');

        const defaultSocials = {
            instagram: 'Not set',
            facebook: 'Not set',
            tiktok: 'Not set',
            whatsapp: '213696004501'
        };

        settingsBtn.addEventListener('click', () => {
            const isHidden = settingsSection.style.display === 'none';
            settingsSection.style.display = isHidden ? 'block' : 'none';
            if (isHidden) renderSocials();
        });

        function renderSocials() {
            const socials = JSON.parse(localStorage.getItem('asmaFlowersSocials')) || defaultSocials;
            const keys = ['instagram', 'facebook', 'tiktok', 'whatsapp'];
            
            socialLinksList.innerHTML = keys.map(key => `
                <div class="social-row" onclick="startEditSocial('${key}', '${socials[key]}')">
                    <span class="social-label">${key}</span>
                    <div id="container-${key}" style='max-width: 40%; overflow-x: auto; scrollbar-width: none;'>
                        <span class="social-value" style='text-wrap: nowrap; overflow-x: auto;'>${socials[key]}</span>
                    </div>
                </div>
            `).join('');
        }

        window.startEditSocial = function(key, currentValue) {
            const container = document.getElementById(`container-${key}`);
            const row = container.closest('.social-row');
            
            // Prevent multiple clicks creating multiple inputs
            if (container.querySelector('input')) return;
            
            // stopPropagation so clicking the row doesn't re-trigger startEditSocial
            container.innerHTML = `
                <div class="edit-container" onclick="event.stopPropagation()">
                    <input type="text" class="social-input" id="input-${key}" value="${currentValue === 'Not set' ? '' : currentValue}">
                    <button class="btn-confirm-mini" onclick="saveSocial('${key}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </button>
                </div>
            `;
            
            document.getElementById(`input-${key}`).focus();
        };

        window.saveSocial = function(key) {
            const newValue = document.getElementById(`input-${key}`).value || 'Not set';
            const socials = JSON.parse(localStorage.getItem('asmaFlowersSocials')) || defaultSocials;
            
            socials[key] = newValue;
            localStorage.setItem('asmaFlowersSocials', JSON.stringify(socials));
            
            renderSocials();
        };

        // Authentication Logic
        const SUPABASE_URL = 'https://acsjkmknrzohrojwmjmi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjc2prbWtucnpvaHJvandtam1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzkyOTUsImV4cCI6MjA5MTc1NTI5NX0.1jxe8mk4lb4snMpXuDFLQyWull56YriUBdlKk1KslFw';

        const authOverlay = document.getElementById('authOverlay');
        const adminContent = document.getElementById('adminContent');
        const loginBtn = document.getElementById('loginBtn');
        const passwordInput = document.getElementById('adminPassword');
        const authCard = document.querySelector('.auth-card');

        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        loginBtn.addEventListener('click', async () => {
            const password = passwordInput.value;
            if (!password) return;

            try {
                const inputHash = await hashPassword(password);
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/admins?select=password_hash`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const data = await response.json();
                const isValid = data.some(admin => admin.password_hash === inputHash);

                if (isValid) {
                    authOverlay.style.display = 'none';
                    adminContent.style.display = 'block';
                    renderDashboard();
                } else {
                    authCard.classList.add('shake');
                    passwordInput.value = '';
                    setTimeout(() => authCard.classList.remove('shake'), 400);
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                alert('Connection error. Please try again.');
            }
        });

        // Allow Enter key
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>

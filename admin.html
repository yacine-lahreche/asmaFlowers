<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Asma Flowers</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <!-- Password Gate Overlay -->
    <div id="authOverlay" class="modal-overlay" style="display: flex; opacity: 1; pointer-events: auto; z-index: 9999;">
        <div class="modal-card auth-card" style="max-width: 400px; text-align: center;">
            <h1 style="font-family: 'Playfair Display', serif; margin-bottom: 30px;">Admin Access</h1>
            <div class="form-group" style="margin-bottom: 25px;">
                <input type="password" id="adminPassword" placeholder="Enter security key..." style="width: 100%; text-align: center;">
            </div>
            <button id="loginBtn" class="btn-add" style="grid-column: span 1; width: 100%;">Verify Identity</button>
        </div>
    </div>

    <div class="admin-container" id="adminContent" style="display: none;">
        <header class="header">
            <a href="index.html" class="btn-back">Back to Site</a>
            <div class="logo">Admin Dashboard</div>
            <button id="settingsBtn" class="settings-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </button>
        </header>

        <!-- Social Links Settings -->
        <section id="settingsSection" class="glass-card" style="display: none; margin-bottom: 40px;">
            <h2>Social Connect Options</h2>
            <div id="socialLinksList" class="social-links-editor">
                <!-- Social links will be injected here -->
            </div>
        </section>

        <!-- Add New Item -->
        <section class="glass-card">
            <h2>Add New Flower</h2>
            <form id="addFlowerForm" class="admin-form">
                <div class="form-group">
                    <label>Flower Name</label>
                    <input type="text" id="flowerName" required placeholder="e.g. Midnight Silk">
                </div>
                <div class="form-group">
                    <label>Price (DA)</label>
                    <input type="number" id="flowerPrice" required placeholder="45.00">
                </div>
                <div class="form-group">
                    <label>Upload Image</label>
                    <input type="file" id="flowerImg" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Tag</label>
                    <input type="text" id="flowerTag" placeholder="e.g. New Release">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea id="flowerDesc" rows="3" required placeholder="Describe the craftsmanship..."></textarea>
                </div>
                <button type="submit" class="btn-add">Add to Collection</button>
            </form>
        </section>

        <!-- Current Inventory -->
        <section class="glass-card">
            <h2>Current Inventory</h2>
            <div style="overflow-x: auto;">
                <table class="inventory-list">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Tag</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Asma Flowers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-accent: #a66a6a;
            --primary-accent-dark: #824f4f;
            --secondary-green: #545454;
            --text-main: #1e2022;
            --text-muted: #434547;
            --white: #ffffff;
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --curve: cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-soft: 0 40px 100px -20px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: url('assets/bg.png') center/cover no-repeat fixed;
            min-height: 100vh;
            color: var(--text-main);
            padding: 40px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .glass-card {
            background: var(--glass-white);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            padding: 40px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 40px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        /* Form Styling */
        .admin-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.8;
        }

        input, textarea {
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.5);
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            background: white;
            border-color: var(--primary-accent);
        }

        .btn-add {
            grid-column: span 2;
            background: var(--primary-accent);
            color: white;
            padding: 18px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: var(--primary-accent-dark);
            transform: translateY(-2px);
        }

        /* Inventory Table */
        .inventory-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .inventory-list th, .inventory-list td {
            text-align: left;
            padding: 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .inventory-list th {
            font-weight: 600;
            opacity: 0.6;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .item-preview {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: rgba(255,255,255,0.3);
        }

        .btn-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <header class="header">
            <a href="index.html" class="btn-back">&larr; Back to Site</a>
            <div class="logo">Admin Dashboard</div>
            <div style="width: 100px;"></div>
        </header>

        <!-- Add New Item -->
        <section class="glass-card">
            <h2>Add New Flower</h2>
            <form id="addFlowerForm" class="admin-form">
                <div class="form-group">
                    <label>Flower Name</label>
                    <input type="text" id="flowerName" required placeholder="e.g. Midnight Silk">
                </div>
                <div class="form-group">
                    <label>Price (DA)</label>
                    <input type="number" id="flowerPrice" required placeholder="45.00">
                </div>
                <div class="form-group">
                    <label>Upload Image</label>
                    <input type="file" id="flowerImg" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Tag</label>
                    <input type="text" id="flowerTag" placeholder="e.g. New Release">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea id="flowerDesc" rows="3" required placeholder="Describe the craftsmanship..."></textarea>
                </div>
                <button type="submit" class="btn-add">Add to Collection</button>
            </form>
        </section>

        <!-- Current Inventory -->
        <section class="glass-card">
            <h2>Current Inventory</h2>
            <div style="overflow-x: auto;">
                <table class="inventory-list">
                    <thead>
                        <tr>
                            <th>Preview</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Tag</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <!-- Items will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const initialProducts = [
            { id: 1, name: 'Satin Classique', price: '4500 DA', img: 'assets/flower.png', tag: 'Most Loved', desc: 'Meticulously folded silken petals in our signature deep rose hue.' },
            { id: 2, name: 'Eternal Champagne', price: '5200 DA', img: 'assets/satin_rose.png', tag: 'Boutique', desc: 'Luxurious champagne-tinted satin ribbons, arranged for shimmer.' },
            { id: 3, name: 'Midnight Bloom', price: '4800 DA', img: 'assets/flower.png', tag: 'New Release', desc: 'A daring deep violet aesthetic, combining avant-garde techniques.' }
        ];

        // Initialize LocalStorage if empty
        if (!localStorage.getItem('asmaFlowersProducts')) {
            localStorage.setItem('asmaFlowersProducts', JSON.stringify(initialProducts));
        }

        function getProducts() {
            return JSON.parse(localStorage.getItem('asmaFlowersProducts'));
        }

        function saveProducts(products) {
            localStorage.setItem('asmaFlowersProducts', JSON.stringify(products));
            renderDashboard();
        }

        function renderDashboard() {
            const products = getProducts();
            const table = document.getElementById('inventoryTable');
            table.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.img}" class="item-preview"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.price}</td>
                    <td>${p.tag || '-'}</td>
                    <td><button class="btn-delete" onclick="deleteItem(${p.id})">Delete</button></td>
                </tr>
            `).join('');
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to remove this piece from the collection?')) {
                const products = getProducts().filter(p => p.id !== id);
                saveProducts(products);
            }
        }

        document.getElementById('addFlowerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('flowerImg');
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onloadend = function() {
                const products = getProducts();
                const newItem = {
                    id: Date.now(),
                    name: document.getElementById('flowerName').value,
                    price: document.getElementById('flowerPrice').value + ' DA',
                    img: reader.result, // Base64 string
                    tag: document.getElementById('flowerTag').value,
                    desc: document.getElementById('flowerDesc').value
                };
                
                products.unshift(newItem);
                saveProducts(products);
                e.target.reset();
                alert('New flower added successfully!');
            }

            if (file) {
                reader.readAsDataURL(file);
            } else {
                alert('Please select an image file.');
            }
        });

        renderDashboard();
    </script>
</body>
</html>
